<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="url(#grad3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <style>
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .search { animation: spin 4s linear infinite; transform-origin: center; }
      .search-line { animation: spin 4s linear infinite reverse; transform-origin: center; }
    </style>
  </defs>
  <circle class="search" cx="11" cy="11" r="8"/>
  <path class="search-line" d="M21 21l-4.35-4.35"/>
</svg>
